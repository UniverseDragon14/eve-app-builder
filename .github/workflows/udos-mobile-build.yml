name: Build UDOS Mobile APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'udos-mobile/**'
      - '.github/workflows/udos-mobile-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: udos-mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: udos-mobile-apk
          path: udos-mobile/app/build/outputs/apk/debug/app-debug.apk
