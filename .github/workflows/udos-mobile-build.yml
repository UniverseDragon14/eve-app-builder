name: UDOS Mobile Android Build

on:
  workflow_dispatch:
  push:
    paths:
      - 'udos-mobile/**'
      - '.github/workflows/udos-mobile-build.yml'

permissions:
  contents: read

env:
  PROJECT_DIR: udos-mobile

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Android project exists
        id: project_check
        shell: bash
        run: |
          if [ -f "$PROJECT_DIR/settings.gradle" ] || [ -f "$PROJECT_DIR/settings.gradle.kts" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "UDOS Mobile project found."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "UDOS Mobile project folder not found yet. Upload udos-mobile/ first."
          fi

      - name: Set up Java 17
        if: steps.project_check.outputs.exists == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        if: steps.project_check.outputs.exists == 'true'
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        if: steps.project_check.outputs.exists == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        if: steps.project_check.outputs.exists == 'true'
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew clean assembleDebug
          else
            gradle clean assembleDebug
          fi

      - name: Upload debug APK artifact
        if: steps.project_check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: UDOS-Mobile-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
